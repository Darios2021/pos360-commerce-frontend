<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ===============================
         DYNAMIC BRANDING (server injected)
         =============================== -->
    <title>__TITLE__</title>
    <meta name="description" content="__DESCRIPTION__" />
    <link rel="canonical" href="__CANONICAL__" />

    <!-- FAVICON (browser) -->
    <link rel="icon" type="image/png" href="__FAVICON__" />
    <link rel="apple-touch-icon" href="__FAVICON__" />

    <!-- ===============================
         OPEN GRAPH (WhatsApp / FB / IG)
         =============================== -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="__SITE_NAME__" />
    <meta property="og:title" content="__OG_TITLE__" />
    <meta property="og:description" content="__OG_DESCRIPTION__" />
    <meta property="og:url" content="__OG_URL__" />

    <meta property="og:image" content="__OG_IMAGE__" />
    <meta property="og:image:secure_url" content="__OG_IMAGE__" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="__OG_IMAGE_ALT__" />

    <!-- ===============================
         TWITTER
         =============================== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="__OG_TITLE__" />
    <meta name="twitter:description" content="__OG_DESCRIPTION__" />
    <meta name="twitter:image" content="__OG_IMAGE__" />

    <!-- ===============================
         FONT: INTER (todo el sistema)
         =============================== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Override agresivo para forzar Inter ANTES de que Vuetify aplique Roboto.
         Tiene que estar en index.html como <style> inline para ganar el cascade. -->
    <style id="brand-font-override">
      html, html *,
      body, body *,
      .v-application, .v-application *,
      input, textarea, button, select, option {
        font-family: "Inter", "InterVariable",
                     -apple-system, BlinkMacSystemFont, "Segoe UI",
                     Roboto, "Helvetica Neue", Arial, sans-serif !important;
      }
    </style>
  </head>

  <body>
    <div id="app"></div>

    <!-- ✅ EN VITE SIEMPRE APUNTÁS AL ENTRY REAL -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
